<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Prática - Listas e Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="conteudo-principal">
        
        <section class="secao-beneficios">
            <h2>Por que escolher nossos serviços?</h2>

            <div class="container-flex">
                <img src="https://via.placeholder.com/300" alt="Imagem Ilustrativa" class="imagem-ajustada">
                
                <div class="lista-container">
                    <h3>Nossos Benefícios</h3>
                    <ul class="minha-lista-estilizada">
                        <li>Atendimento personalizado</li>
                        <li>Suporte 24 horas</li>
                        <li>Preços competitivos</li>
                        <li>Garantia de qualidade</li>
                    </ul>
                </div>
            </div>
        </section>

        <hr>

        <section class="secao-passos">
            <h3>Como começar (Passo a Passo)</h3>
            <ol type="A" class="minha-lista-estilizada">
                <li>Faça seu cadastro no site</li>
                <li>Escolha o plano ideal</li>
                <li>Aproveite nossos recursos</li>
            </ol>
        </section>

    </div>

</body>
</html>
